<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <!-- your metadata goes here in the "head" -->
    <title>Artware Workshop</title>
    <meta name="author" content="Nick Briz">
    <meta name="description" content="Notes from netizen.org's artware (software art) workshop.">
    <link rel="icon" href="images/icon.png">

    <!-- metadata for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="images/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- "open graph" metadata for social media posts -->
    <meta property="og:title" content="Artware Workshop">
    <meta property="og:description" content="Notes from netizen.org's artware (software art) workshop.">
    <meta property="og:image" content="https://artware.app/images/icon.png">
    <meta property="og:url" content="https://artware.app">
    <meta property="og:type" content="website">
    
    <!-- import our CSS code -->
    <link rel="stylesheet" href="styles.css">
    <style>
      html, body { overflow: hidden; }
    </style>
  </head>
  <body>
    
    <section id="app">
      <header>
        <div>
          <img src="images/icon.png" alt="artware icon">
        </div>
        <h3>artware.app</h3>
      </header>

      <nav>
        <select id="b-type"></select>
        <select id="b-pick"></select>
        <select id="b-mode"></select>
        &nbsp;⮂&nbsp;
        <button id="undo">undo</button>
        <button id="clear">clear</button>
        <button id="save">save</button>
        <span id="info"></span>
        <button id="notes">workshop notes</button>
      </nav>

      <main></main>
    </section>
        
    <script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library@1.0.1/build/nn.min.js"></script>
    <script src="artware.js"></script>
  </body>
</html>
